<!DOCTYPE html>
<html><head><style>
  html,body{margin:0;padding:0;}
  body{
    width:440px;height:280px;
    background:linear-gradient(135deg,#1a73e8 0%,#174ea6 100%);
    display:flex;align-items:center;justify-content:center;gap:28px;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    color:#fff;overflow:hidden;
  }
  .icon{
    background:#fff;border-radius:24px;width:140px;height:140px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 24px rgba(0,0,0,0.18);
  }
  .icon svg{width:96px;height:96px;}
  .text{display:flex;flex-direction:column;}
  .name{font-size:42px;font-weight:700;letter-spacing:-0.5px;line-height:1;}
  .tag{font-size:15px;opacity:0.85;margin-top:10px;line-height:1.35;max-width:220px;}
</style></head><body>
  <div class="icon">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="geometricPrecision">
      <rect x="20" y="60" width="20" height="48" rx="3" fill="#1a73e8"/>
      <rect x="54" y="36" width="20" height="72" rx="3" fill="#1a73e8"/>
      <rect x="88" y="76" width="20" height="32" rx="3" fill="#ea4335"/>
      <line x1="14" y1="116" x2="114" y2="116" stroke="#1a73e8" stroke-width="6" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="text">
    <div class="name">Sidewire</div>
    <div class="tag">Network requests in a side panel — without DevTools.</div>
  </div>
</body></html>
