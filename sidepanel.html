<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sidewire</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="titlebar">
    <span class="brand">
      <svg viewBox="0 0 128 128" aria-hidden="true">
        <rect x="20" y="60" width="20" height="48" rx="3" fill="#1a73e8"/>
        <rect x="54" y="36" width="20" height="72" rx="3" fill="#1a73e8"/>
        <rect x="88" y="76" width="20" height="32" rx="3" fill="#ea4335"/>
        <line x1="14" y1="116" x2="114" y2="116" stroke="#1a73e8" stroke-width="6" stroke-linecap="round"/>
      </svg>
      Sidewire
    </span>
    <span class="version">v0.5.0</span>
    <span class="spacer"></span>
    <button id="themeToggle" class="icon-btn" title="Toggle theme"></button>
  </div>

  <header>
    <div class="row">
      <button id="pause" class="btn" title="Pause/resume capture (or click in panel and press P)"></button>
      <button id="clear" class="btn" title="Clear unstarred entries"></button>
      <button id="copyAll" class="btn" title="Copy all visible URLs"></button>
      <button id="exportHar" class="btn" title="Export visible entries as HAR"></button>
      <span class="spacer"></span>
      <select id="scope" title="Capture scope">
        <option value="active">Active tab</option>
        <option value="all">All tabs</option>
      </select>
    </div>

    <div class="row">
      <div class="search">
        <span id="urlFilterIcon" class="search-icon"></span>
        <input id="urlFilter" type="text" placeholder="Filter URL (substring or /regex/) — press / to focus" />
        <button id="urlFilterClear" class="search-clear" type="button" title="Clear filter" hidden></button>
      </div>
      <select id="statusFilter">
        <option value="">All statuses</option>
        <option value="2">2xx</option>
        <option value="3">3xx</option>
        <option value="4">4xx</option>
        <option value="5">5xx</option>
        <option value="err">Errors</option>
      </select>
    </div>

    <div class="row small">
      <select id="domainFilter">
        <option value="">All domains</option>
      </select>
      <label class="check"><input type="checkbox" id="starredOnly"> ★ only</label>
      <label class="check">Slow &gt; <input type="number" id="slowThreshold" value="1000" min="0" step="100"> ms</label>
    </div>

    <details class="filters">
      <summary>Methods &amp; types</summary>
      <div class="chips" id="methodChips"></div>
      <div class="chips" id="typeChips"></div>
    </details>

    <div class="row small wrap">
      <label class="check" title="Attach chrome.debugger to active tab to capture response bodies (Chrome shows its built-in debugger notification bar on the tab while attached)">
        <input type="checkbox" id="captureBodies"> Capture response bodies (debugger)
      </label>
      <label class="check" title="Auto-decode JWT tokens found in request/response headers">
        <input type="checkbox" id="decodeJwtToggle"> Decode JWT in headers
      </label>
    </div>

    <div class="counts"><span id="counts"></span></div>
  </header>

  <ul id="list" class="list"></ul>

  <script src="sidepanel.js"></script>
</body>
</html>
